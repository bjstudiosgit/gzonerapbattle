<!DOCTYPE html>
<html>
<head>
  <title>G-Zone Fan Chat</title>
</head>
<body style="background:black;color:white;font-family:Arial;">

<h2>🔥 G-Zone Fan Chat</h2>

<div id="chat" style="height:300px;overflow:auto;border:1px solid #333;padding:10px;"></div>

<input id="msg" placeholder="Say something..." style="width:80%;">
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// 🔗 CONNECT TO SUPABASE
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://gzbiqhftbsqmdcofodhl.supabase.co",
  "sb_publishable_N3_vo3ilLtngmDuM8ajP8A_0z1K2DVq"
);

// 👤 ASK FOR NAME (EVERY TIME)
let username = prompt("Enter your name:");

if (!username || username.trim() === "") {
  username = "Anonymous";
} else {
  username = username.trim().substring(0, 20);
}

const chat = document.getElementById("chat");

// 🕒 FORMAT TIME
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString();
}

// 💬 ADD MESSAGE TO UI
function addMessage(msg){
  const div = document.createElement("div");

  div.innerHTML = `
    <span style="color:orange;font-weight:bold;">${msg.user_name}</span>
    <span style="color:gray;font-size:12px;">[${formatTime(msg.created_at)}]</span>
    : ${msg.text}
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 📥 LOAD EXISTING MESSAGES
async function loadMessages(){
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .order("created_at");

  console.log("LOAD:", data, error);

  if (data) data.forEach(addMessage);
}

// ⚡ REALTIME UPDATES
supabaseClient
  .channel("chat")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "messages" },
    (payload) => {
      console.log("REALTIME:", payload);
      addMessage(payload.new);
    }
  )
  .subscribe();

// 📤 SEND MESSAGE
async function sendMessage(){
  const input = document.getElementById("msg");
  const text = input.value;

  // 🔒 BASIC PROTECTION
  if (!text) return;
  if (text.length > 200) return;
  if (text.includes("http")) return;

  const { data, error } = await supabaseClient
    .from("messages")
    .insert([
      {
        user_name: username,
        text: text
      }
    ]);

  console.log("SEND:", data, error);

  input.value = "";
}

// 🚀 INIT
loadMessages();
</script>

</body>
</html>
