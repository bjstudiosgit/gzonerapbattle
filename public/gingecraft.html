<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Portrait</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050508; /* Dark, moody background */
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #444;
            pointer-events: none;
            z-index: 100;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>

    <style>
      /* Hides common overlay IDs and classes used in Three.js examples and generated code */
      #info, #loading, #ui, #instructions, .label, .overlay, #description {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }
      /* Ensure the body doesn't show selected text cursor interaction outside canvas */
      body {
        user-select: none !important;
      }
    </style>
  </head>
<body>
    <div id="info">Drag to rotate • Scroll to zoom</div>
    <!-- Import Three.js as an ES module -->
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050508, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 36);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Main key light simulating flash/front light
        const mainLight = new THREE.DirectionalLight(0xfff0e6, 1.5);
        mainLight.position.set(10, 20, 20);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 100;
        mainLight.shadow.camera.left = -20;
        mainLight.shadow.camera.right = 20;
        mainLight.shadow.camera.top = 20;
        mainLight.shadow.camera.bottom = -20;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        // Rim light for depth
        const rimLight = new THREE.DirectionalLight(0x88bbff, 1.0);
        rimLight.position.set(-15, 10, -15);
        scene.add(rimLight);

        // --- Voxel Engine ---
        const voxelSize = 1;
        // slightly smaller geometry than grid to emphasize blocks
        const geometry = new THREE.BoxGeometry(voxelSize * 0.96, voxelSize * 0.96, voxelSize * 0.96); 
        
        // Color Palette based on image
        const PALETTE = {
            SKIN: 0xd49b75,
            SKIN_SHADOW: 0xba7c55,
            SKIN_HIGHLIGHT: 0xe6b08e,
            BEARD_BASE: 0xa84010,
            BEARD_MID: 0xc85515,
            BEARD_HIGH: 0xda6a22,
            HAT_BLACK: 0x151515,
            HAT_WEAR: 0x2a2a2a,
            PATCH_RED: 0xdc2020,
            PATCH_WHITE: 0xeeeeee,
            PATCH_BLACK: 0x050505,
            EYE_WHITE: 0xffffff,
            EYE_PUPIL: 0x0a0a0a,
            MOUTH_DARK: 0x301111,
            TEETH: 0xd0d0d0,
            SHIRT: 0x1c1e20,
            CHAIN_BASE: 0x999999,
            CHAIN_HIGH: 0xeeeeee
        };

        const materials = {};
        for (const [key, hex] of Object.entries(PALETTE)) {
            materials[key] = new THREE.MeshStandardMaterial({ 
                color: hex, 
                roughness: 0.8,
                metalness: key.includes('CHAIN') ? 0.6 : 0.1
            });
        }

        const voxelData = {}; // Store positions per material key
        for (const key in PALETTE) voxelData[key] = [];

        function setVoxel(x, y, z, matKey) {
            if (voxelData[matKey]) {
                voxelData[matKey].push(new THREE.Vector3(x, y, z));
            }
        }

        // Fill a rectangular volume
        function fillBox(x1, x2, y1, y2, z1, z2, matKey, noiseProb = 0, noiseMatKey = null) {
            for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
                for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
                    for (let z = Math.min(z1, z2); z <= Math.max(z1, z2); z++) {
                        if (noiseProb > 0 && Math.random() < noiseProb && noiseMatKey) {
                            setVoxel(x, y, z, noiseMatKey);
                        } else {
                            setVoxel(x, y, z, matKey);
                        }
                    }
                }
            }
        }

        // --- Sculpting the Character ---
        
        // 1. Head Base
        fillBox(-5, 5, -3, 6, -5, 3, 'SKIN');
        fillBox(-4, 4, -4, 5, 4, 4, 'SKIN'); // Front face plane

        // Forehead wrinkles / texture
        fillBox(-3, 3, 5, 5, 4, 4, 'SKIN_SHADOW');
        fillBox(-2, 2, 3, 3, 4, 4, 'SKIN_SHADOW');

        // 2. The Hat
        // Dome
        fillBox(-6, 6, 7, 10, -6, 5, 'HAT_BLACK', 0.1, 'HAT_WEAR');
        fillBox(-5, 5, 11, 11, -5, 4, 'HAT_BLACK');
        // Brim (curved)
        fillBox(-6, 6, 6, 6, 5, 7, 'HAT_BLACK');
        fillBox(-5, 5, 6, 6, 8, 9, 'HAT_BLACK');
        fillBox(-4, 4, 5, 5, 10, 10, 'HAT_BLACK');

        // Hat Patch (Front center)
        fillBox(-3, 3, 7, 10, 6, 6, 'PATCH_RED');
        fillBox(-2, 2, 8, 9, 6.2, 6.2, 'PATCH_WHITE');
        // Barcode stripes (approximation)
        setVoxel(-1, 8, 6.3, 'PATCH_BLACK'); setVoxel(-1, 9, 6.3, 'PATCH_BLACK');
        setVoxel(0, 8, 6.3, 'PATCH_BLACK'); setVoxel(0, 9, 6.3, 'PATCH_BLACK');
        setVoxel(2, 8, 6.3, 'PATCH_BLACK'); setVoxel(2, 9, 6.3, 'PATCH_BLACK');

        // 3. Facial Features
        // Eyes (Wide open, intense) - Y: 1 to 3, Z: 4.1
        // Left Eye
        fillBox(-4, -2, 1, 3, 4.1, 4.1, 'EYE_WHITE');
        fillBox(-3, -2, 1, 2, 4.3, 4.3, 'EYE_PUPIL');
        setVoxel(-3, 2, 4.4, 'EYE_WHITE'); // Catchlight
        // Right Eye
        fillBox(2, 4, 1, 3, 4.1, 4.1, 'EYE_WHITE');
        fillBox(2, 3, 1, 2, 4.3, 4.3, 'EYE_PUPIL');
        setVoxel(2, 2, 4.4, 'EYE_WHITE'); // Catchlight

        // Nose
        fillBox(-1, 1, -2, 0, 4.5, 5.5, 'SKIN_HIGHLIGHT');
        setVoxel(-1, -2, 5, 'SKIN_SHADOW'); // Nostril
        setVoxel(1, -2, 5, 'SKIN_SHADOW'); // Nostril

        // Mouth (Open, visible teeth)
        fillBox(-2, 2, -4, -3, 4.1, 4.1, 'MOUTH_DARK');
        fillBox(-1, 1, -3.5, -3.5, 4.3, 4.3, 'TEETH'); // Upper teeth

        // 4. The Beard (Volumetric, textured)
        // Helper to add a fuzzy volume
        function addFuzzyBeard(x1, x2, y1, y2, z1, z2, density) {
            for(let x=x1; x<=x2; x++) {
                for(let y=y1; y<=y2; y++) {
                    for(let z=z1; z<=z2; z++) {
                        // Create a rounded/tapered shape based on position
                        let distFromCenter = Math.sqrt(x*x + z*z);
                        if (distFromCenter > 6) continue;
                        
                        if (Math.random() < density) {
                            let rand = Math.random();
                            let mat = 'BEARD_MID';
                            if (rand < 0.3) mat = 'BEARD_BASE';
                            else if (rand > 0.8) mat = 'BEARD_HIGH';
                            
                            // Hollow out mouth area
                            if (y > -5 && Math.abs(x) < 3 && z > 3) continue;

                            setVoxel(x, y, z, mat);
                        }
                    }
                }
            }
        }
        
        // Sideburns / Cheeks
        addFuzzyBeard(-6, -4, -5, 1, 0, 4, 0.8);
        addFuzzyBeard(4, 6, -5, 1, 0, 4, 0.8);
        // Chin / Lower jaw (extends down and out)
        addFuzzyBeard(-5, 5, -8, -4, 2, 6, 0.9);
        addFuzzyBeard(-3, 3, -10, -8, 3, 5, 0.7); // Pointy bit
        // Mustache area
        addFuzzyBeard(-3, 3, -3, -1, 4.5, 5.5, 0.85);

        // 5. Torso & Shirt
        fillBox(-8, 8, -16, -6, -4, 3, 'SHIRT');
        fillBox(-10, 10, -16, -10, -3, 2, 'SHIRT'); // Shoulders

        // 6. The Chain (Chunky, twisted look)
        function drawChainLink(cx, cy, cz) {
            setVoxel(cx, cy, cz, 'CHAIN_HIGH');
            setVoxel(cx+1, cy, cz, 'CHAIN_BASE');
            setVoxel(cx-1, cy, cz, 'CHAIN_BASE');
            setVoxel(cx, cy+1, cz, 'CHAIN_BASE');
            setVoxel(cx, cy-1, cz, 'CHAIN_BASE');
        }

        // Left side chain
        for(let i=0; i<6; i++) {
            drawChainLink(-5 + i*0.5, -6 - i*1.5, 3.5 + i*0.2);
        }
        // Right side chain
        for(let i=0; i<6; i++) {
            drawChainLink(5 - i*0.5, -6 - i*1.5, 3.5 + i*0.2);
        }
        // Center pendant/join area
        fillBox(-2, 2, -14, -13, 4, 5, 'CHAIN_HIGH', 0.5, 'CHAIN_BASE');


        // --- Background Crowd (Out of focus voxels) ---
        for(let i=0; i<200; i++) {
            let rx = (Math.random() - 0.5) * 80;
            let ry = (Math.random() - 0.5) * 60;
            let rz = -20 - Math.random() * 40;
            
            // Keep center somewhat clear
            if (Math.abs(rx) < 15 && Math.abs(ry) < 15) continue;

            let c = Math.random() > 0.5 ? 0x111115 : 0x221111;
            setVoxel(Math.round(rx), Math.round(ry), Math.round(rz), 'SHIRT'); // Reusing a dark material
        }


        // --- Build InstancedMeshes ---
        const voxelGroup = new THREE.Group();
        const dummy = new THREE.Object3D();

        for (const [matKey, positions] of Object.entries(voxelData)) {
            if (positions.length === 0) continue;

            const instancedMesh = new THREE.InstancedMesh(geometry, materials[matKey], positions.length);
            instancedMesh.castShadow = true;
            instancedMesh.receiveShadow = true;

            positions.forEach((pos, index) => {
                dummy.position.copy(pos);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(index, dummy.matrix);
            });

            instancedMesh.instanceMatrix.needsUpdate = true;
            voxelGroup.add(instancedMesh);
        }

        // Center the model vertically
        voxelGroup.position.y = 2;
        scene.add(voxelGroup);


        // --- Interaction & Animation ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Basic wheel zoom
        document.addEventListener('wheel', (event) => {
            camera.position.z += event.deltaY * 0.05;
            camera.position.z = THREE.MathUtils.clamp(camera.position.z, 20, 80);
        });

        // Touch support for rotation
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchmove', e => {
            let touchX = e.touches[0].clientX;
            mouseX = (touchX - windowHalfX) * 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Interactive rotation
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            voxelGroup.rotation.y += 0.05 * (targetX - voxelGroup.rotation.y);
            voxelGroup.rotation.x += 0.05 * (targetY - voxelGroup.rotation.x);

            // Subtle floating animation
            voxelGroup.position.y = 2 + Math.sin(time * 1.5) * 0.5;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
